# CI de Nível 04 - Pipeline Integrada ao Build do código

# nome da pipeline
name: "Execução Integrada"

# gatilhos / triggers - regras de disparo
# gatilho manual = workflow_dispatch

on:
    workflow_dispatch:

#tarefas dentro da pipeline = jobs

jobs:
    #nome do job
    inspecao:
        # maquina onde o job vai rodar
        runs-on: ubuntu-latest

        # passos do job
        steps:
            # clone do projeto
            - uses: actions/checkout@v4

            # instalção do node
            - uses: actions/setup-node@v4
              with:
                  node-version: latest

            # instalação do Yarn
            - name: Instalando Yarn
              run: npm install -g yarn
            
            #   instalação das dependências
            - name: Instalando dependências
              run: yarn
            
            - name: Inspeção do código
              run: yarn lint

    unidade:
      runs-on: ubuntu-latest
      needs: [inspecao]
      
      steps:
            # clone do projeto
            - uses: actions/checkout@v4

            # instalção do node
            - uses: actions/setup-node@v4
              with:
                  node-version: latest

            - name: Instalando Yarn
              run: npm install -g yarn

            #   instalação das dependências
            - name: Instalando dependências
              run: yarn
            
            - name: Rodando testes unitários
              run: yarn run test

    e2e-testes:
      runs-on: ubuntu-latest
      needs: [inspecao]
      
      steps:
            # clone do projeto
            - uses: actions/checkout@v4

            # instalção do node
            - uses: actions/setup-node@v4
              with:
                  node-version: latest

            - name: Instalando Yarn
              run: npm install -g yarn

            #   instalação das dependências
            - name: Instalando dependências
              run: yarn

            # instalação dos Browsers do Playwright
            - name: Instalando Browsers do Playwright
              run: yarn playwright install
            
            # executar os testes e2e
            - name: Executando testes e2e
              run: yarn run e2e
            
    deploy:
      runs-on: ubuntu-latest
      needs: [inspecao, e2e-testes]

      steps:
        - name: Simulação de deploy
          run: echo 'deploy sendo realizado...'
      